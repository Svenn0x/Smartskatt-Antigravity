<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smartskatt 2026 - Optimaliser skatt, fradrag og krypto</title>
    <meta name="description" content="Smartskatt.no hjelper deg med å finne fradrag og optimalisere din skatt. Inkluderer skattekalkulator, krypto-skatt og fradragsordbok for bedrift og privat." />
    <meta name="keywords" content="skatt, fradrag, krypto, skattekalkulator, 2026" />
    
    <!-- Speculative Loading & Fetchpriority -->
    <link rel="preload" as="image" href="/hero.webp" fetchpriority="high">
    <link rel="preload" as="image" href="/logo.webp" fetchpriority="high">

    <!-- Font Subsetting & Inline Critical CSS -->
    <style>
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 400 700;
        font-display: swap;
        src: local('Inter'), local('Inter-Regular'), url('/fonts/inter-subset.woff2') format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      :root { --primary-blue: #004A99; --primary-blue-dark: #003670; --secondary-green: #2ECC71; --secondary-green-hover: #27ae60; --bg-white: #FFFFFF; --bg-light-gray: #F9FAFB; --text-dark: #1F2937; --text-gray: #4B5563; --border-color: #E5E7EB; --font-family: 'Inter', system-ui, -apple-system, sans-serif; }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: var(--font-family); color: var(--text-dark); background-color: var(--bg-white); line-height: 1.6; -webkit-font-smoothing: antialiased; }
      h1, h2, h3, h4, h5, h6 { font-weight: 700; line-height: 1.2; color: var(--primary-blue); }
      a { text-decoration: none; color: var(--primary-blue); transition: color 0.2s ease; }
      a:hover { color: var(--primary-blue-dark); }
      img { max-width: 100%; height: auto; display: block; }
      .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
      .text-center { text-align: center; }
      .section-padding { padding: 8rem 0; }
      .bg-light { background-color: var(--bg-light-gray); }
      .bg-blue { background-color: var(--primary-blue); color: white; }
      .bg-blue h2 { color: white; }
      .btn { display: inline-flex; align-items: center; justify-content: center; padding: 1rem 2rem; border-radius: 8px; font-weight: 600; font-size: 1.1rem; border: none; cursor: pointer; transition: all 0.3s ease; text-align: center; }
      .btn-green { background-color: var(--secondary-green); color: white; box-shadow: 0 4px 6px rgba(46, 204, 113, 0.2); }
      .btn-green:hover { background-color: var(--secondary-green-hover); transform: translateY(-2px); box-shadow: 0 6px 12px rgba(46, 204, 113, 0.3); color: white; }
      .btn-subtext { display: block; font-size: 0.85rem; font-weight: 400; opacity: 0.9; margin-top: 0.2rem; }
      .navbar { padding: 1.5rem 0; display: flex; justify-content: space-between; align-items: center; }
      .logo { font-size: 1.5rem; font-weight: 700; color: var(--primary-blue); display: flex; align-items: center; gap: 0.5rem; }
      .hero { padding: 4rem 0 6rem; overflow: hidden; }
      .hero-content { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; }
      .hero-text h1 { font-size: 3.5rem; margin-bottom: 1.5rem; letter-spacing: -0.02em; }
      .hero-text p { font-size: 1.25rem; color: var(--text-gray); margin-bottom: 2.5rem; max-width: 90%; }
      .hero-image-wrapper { position: relative; border-radius: 20px; box-shadow: 0 20px 40px rgba(0, 74, 153, 0.1); overflow: hidden; background-color: var(--bg-white); border: 1px solid var(--border-color); }
      .hero-image-wrapper img { width: 100%; transform: scale(1.02); }
    </style>
